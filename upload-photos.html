<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Uploads | Darshan's Magic</title>
    <meta name="description" content="Admin photo uploader and folder manager for Cloudinary.">
    <meta name="robots" content="noindex,nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="admin-upload-page">
    <div class="admin-shell">
      <header class="admin-topbar">
        <div class="admin-topbar-main">
          <a class="admin-brand" href="index.html" aria-label="Darshan's Magic home">
            <img class="admin-brand-logo" src="assets/logo.png" alt="Darshan's Magic logo">
            <div class="admin-brand-copy">
              <strong>Photo Uploads</strong>
              <span>Cloudinary admin</span>
            </div>
          </a>

          <div class="admin-topbar-actions">
            <button class="button button-secondary admin-icon-button" id="cloudinary-toggle-folder-sheet" type="button">Folders</button>
            <button class="button button-primary" id="cloudinary-open-upload-modal" type="button">Upload</button>
          </div>
        </div>
      </header>

      <main class="admin-main">
        <section class="admin-folder-strip">
          <div class="admin-folder-chips" id="cloudinary-folder-chip-list">
            <article class="upload-result-empty">Loading folders...</article>
          </div>
        </section>

        <section class="admin-workspace">
          <aside class="admin-sidebar">
            <div class="admin-sidebar-head">
              <p class="admin-sidebar-title">Folders</p>
              <label class="admin-search" for="cloudinary-folder-search">
                <input id="cloudinary-folder-search" type="search" placeholder="Search folders">
              </label>
            </div>
            <div class="upload-folder-list admin-folder-list" id="cloudinary-folder-list">
              <article class="upload-result-empty">Loading folders...</article>
            </div>
          </aside>

          <div class="admin-content">
            <section class="admin-content-toolbar">
              <div class="admin-context-copy">
                <div class="upload-folder-breadcrumbs" id="cloudinary-folder-breadcrumbs"></div>
                <p class="upload-folder-current"><strong id="cloudinary-active-folder">darshan-magic/gallery</strong></p>
                <p class="upload-folder-meta" id="cloudinary-folder-meta">Loading folder contents...</p>
              </div>

              <div class="admin-context-actions">
                <button class="button button-secondary" id="cloudinary-refresh-folder" type="button">Refresh</button>
                <button class="button button-secondary" id="cloudinary-create-folder" type="button">New Folder</button>
                <button class="button button-primary" id="cloudinary-upload-here" type="button">Upload</button>
                <button class="button button-danger" id="cloudinary-delete-selected" type="button" disabled>Delete</button>
              </div>
            </section>

            <section class="admin-upload-dropzone" id="cloudinary-dropzone" tabindex="0" role="button" aria-label="Upload photos to selected folder">
              <input id="cloudinary-explorer-upload" type="file" accept="image/*" multiple hidden>
              <div class="admin-upload-dropzone-icon">+</div>
              <div class="admin-upload-dropzone-copy">
                <strong>Tap to upload photos</strong>
                <span>or drag and drop</span>
              </div>
            </section>

            <section class="admin-grid-panel">
              <div class="upload-results-grid admin-photo-grid" id="cloudinary-upload-results">
                <article class="upload-result-empty">
                  Loading folder photos...
                </article>
              </div>
            </section>
          </div>
        </section>
      </main>

      <div class="admin-selection-bar" id="cloudinary-selection-bar" hidden>
        <div class="admin-selection-copy">
          <strong id="cloudinary-selection-count">0 selected</strong>
        </div>
        <div class="admin-selection-actions">
          <button class="button button-secondary" id="cloudinary-select-all" type="button">Select All</button>
          <button class="button button-secondary" id="cloudinary-clear-selection" type="button">Clear</button>
          <button class="button button-danger" id="cloudinary-delete-selected-mobile" type="button" disabled>Delete</button>
        </div>
      </div>

      <div class="admin-folder-sheet" id="cloudinary-folder-sheet" hidden>
        <div class="admin-folder-sheet-backdrop" data-close-folder-sheet></div>
        <div class="admin-folder-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="cloudinary-folder-sheet-title">
          <div class="admin-folder-sheet-head">
            <h2 id="cloudinary-folder-sheet-title">Folders</h2>
            <button class="admin-sheet-close" id="cloudinary-close-folder-sheet" type="button">Close</button>
          </div>
          <label class="admin-search admin-search-sheet" for="cloudinary-folder-search-sheet">
            <input id="cloudinary-folder-search-sheet" type="search" placeholder="Search folders">
          </label>
          <div class="upload-folder-list admin-folder-sheet-list" id="cloudinary-folder-sheet-list">
            <article class="upload-result-empty">Loading folders...</article>
          </div>
        </div>
      </div>

      <div class="upload-modal" id="cloudinary-upload-modal" hidden>
        <div class="upload-modal-backdrop" data-close-upload-modal></div>
        <div class="upload-modal-dialog admin-upload-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="cloudinary-upload-modal-title">
          <div class="upload-modal-header">
            <div>
              <p class="upload-pane-label">Upload</p>
              <h3 id="cloudinary-upload-modal-title">Add photos</h3>
            </div>
            <button class="upload-modal-close" id="cloudinary-close-upload-modal" type="button" aria-label="Close upload modal">Close</button>
          </div>

          <form class="booking-form upload-form admin-upload-form" id="cloudinary-upload-form">
            <div class="booking-grid">
              <label class="field field-full">
                <span>Folder</span>
                <select name="existingFolder" id="cloudinary-existing-folder">
                  <option value="darshan-magic/gallery">darshan-magic/gallery</option>
                </select>
              </label>

              <label class="field field-full">
                <span>New folder</span>
                <input type="text" name="newFolderName" placeholder="Birthday Party or darshan-magic/events/birthday-party">
              </label>

              <label class="field field-full">
                <span>Photos</span>
                <input type="file" name="photos" id="cloudinary-photos" accept="image/*" multiple required>
              </label>
            </div>

            <button class="button button-primary booking-submit" id="upload-form" type="submit">Upload Photos</button>
            <p class="booking-status admin-upload-status" id="cloudinary-upload-status" role="status" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
